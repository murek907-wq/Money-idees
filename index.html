<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Generator</title>

<style>
body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

h1{
font-size:40px;
}

.box{
max-width:600px;
margin:auto;
background:#1c1c1c;
padding:30px;
border-radius:12px;
}

textarea{
width:100%;
height:120px;
border:none;
border-radius:8px;
padding:10px;
margin-top:10px;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
background:#00ff88;
font-weight:bold;
border-radius:8px;
cursor:pointer;
}

#result{
margin-top:20px;
background:#000;
padding:15px;
border-radius:8px;
min-height:80px;
}
</style>

</head>

<body>

<h1>🤖 AI Generator</h1>

<div class="box">

<p>Skriv hva du vil at AI skal lage:</p>

<textarea id="prompt" placeholder="Skriv her..."></textarea>

<br>

<button onclick="generate()">Generer</button>

<div id="result">AI svar vises her...</div>

</div>

<script>

async function generate(){

const prompt = document.getElementById("prompt").value;

document.getElementById("result").innerHTML = "Tenker...";

const response = await fetch("https://api.openai.com/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer DIN_API_NØKKEL"
},

body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"user",content:prompt}
]
})

});

const data = await response.json();

document.getElementById("result").innerHTML =
data.choices[0].message.content;

}

</script>

</body>
</html>
