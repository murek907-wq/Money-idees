<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Side Hustle Generator</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

h1{
font-size:40px;
margin-bottom:10px;
}

button{
background:#22c55e;
border:none;
padding:15px 30px;
font-size:18px;
border-radius:10px;
cursor:pointer;
margin:10px;
}

button:hover{
background:#16a34a;
}

.card{
background:#1e293b;
padding:25px;
margin:20px auto;
max-width:400px;
border-radius:15px;
font-size:20px;
}

.premium{
background:#1e293b;
padding:20px;
margin-top:30px;
border-radius:15px;
}

a{
text-decoration:none;
}

</style>
</head>

<body>

<h1>🤖 AI Side Hustle Generator</h1>

<p>Generate business ideas using AI logic</p>

<button onclick="generateIdea()">Generate Idea</button>

<div class="card" id="idea">
Click generate to get an idea
</div>

<button onclick="shareIdea()">Share Idea 🚀</button>

<div class="premium">
<h2>🔥 Premium Ideas</h2>
<p>Unlock 500 premium ideas</p>

<a href="https://www.shopify.com" target="_blank">
<button>Start Business</button>
</a>

</div>

<script>

const ideas = [

"Start a TikTok automation channel",
"Sell AI generated logos",
"Create a dropshipping store",
"Build a niche blog about AI",
"Create digital products and sell them",
"Sell Notion templates online",
"Start a faceless YouTube channel",
"Create a website flipping business",
"Sell prompts for AI tools",
"Create a simple SaaS for freelancers",
"Build an AI writing tool",
"Start a print on demand store",
"Create a social media growth service",
"Sell digital planners",
"Start a niche newsletter",
"Create a micro SaaS product",
"Build a website that finds remote jobs",
"Start a niche meme page",
"Sell website templates",
"Create an AI image generator tool"

];

function generateIdea(){

const random = Math.floor(Math.random()*ideas.length);

document.getElementById("idea").innerText = ideas[random];

}

function shareIdea(){

const text = document.getElementById("idea").innerText;

navigator.clipboard.writeText(text);

alert("Idea copied! Share it on TikTok 🚀");

}

</script>

</body>

</html>
