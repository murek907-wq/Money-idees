<!DOCTYPE html>
<html>
<head>

<title>AI Side Hustle Generator</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
}

h1{
font-size:42px;
}

.card{
background:#1e293b;
padding:25px;
margin-top:30px;
border-radius:12px;
}

button{
background:#22c55e;
border:none;
padding:15px 25px;
font-size:18px;
border-radius:10px;
color:white;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.share{
background:#3b82f6;
}

.premium{
background:#f59e0b;
}

</style>

</head>

<body>

<div class="container">

<h1>🤖 AI Side Hustle Generator</h1>

<p>Generate business ideas using AI logic</p>

<button onclick="generate()">Generate Idea</button>

<div class="card">

<h2 id="idea">Click generate</h2>

</div>

<div class="card">

<h2>🔥 Premium Ideas</h2>

<p>Unlock 500 premium ideas</p>

<button class="premium" onclick="premium()">Unlock Premium</button>

</div>

<div class="card">

<h2>🚀 Share</h2>

<button class="share" onclick="share()">Share this site</button>

</div>

</div>

<script>

const industries = [
"AI tools",
"digital products",
"fitness",
"crypto",
"education",
"gaming",
"productivity",
"social media"
]

const methods = [
"subscription service",
"marketplace",
"online course",
"automation tool",
"mobile app",
"template store",
"content platform"
]

const audiences = [
"students",
"creators",
"freelancers",
"small businesses",
"remote workers",
"gamers"
]

function generate(){

let industry = industries[Math.floor(Math.random()*industries.length)]

let method = methods[Math.floor(Math.random()*methods.length)]

let audience = audiences[Math.floor(Math.random()*audiences.length)]

let idea = method + " for " + audience + " using " + industry

document.getElementById("idea").innerText = idea

}

function premium(){

alert("Premium ideas coming soon")

}

function share(){

navigator.clipboard.writeText(window.location.href)

alert("Link copied!")

}

</script>

</body>
</html>
